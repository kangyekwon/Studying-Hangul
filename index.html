<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="description" content="Learn Korean with fun K-POP themed games! Flashcards, quizzes, memory games and more.">
<meta name="keywords" content="Korean, learn Korean, K-POP, Korean language, hangul, vocabulary">
<meta name="author" content="K-POP Korean Learning">
<meta name="theme-color" content="#0a0a1a">
<meta property="og:title" content="K-POP Korean Learning Game">
<meta property="og:description" content="Master Korean with style! Fun games inspired by K-POP culture.">
<meta property="og:type" content="website">
<meta property="og:image" content="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇰🇷</text></svg>">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
<link rel="manifest" href="manifest.json">

<title>K-POP Korean Learning Game</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--neon-pink:#ff2d95;--neon-purple:#9d4edd;--neon-blue:#00d4ff;--neon-cyan:#00f5d4;--bg-dark:#0a0a1a;--bg-card:rgba(20,10,40,0.8);--glass:rgba(255,255,255,0.05);--gold:#ffd700;--fire:#ff6b35}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.7;transform:scale(1.05)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px var(--neon-pink),0 0 40px var(--neon-purple)}50%{box-shadow:0 0 40px var(--neon-pink),0 0 80px var(--neon-purple)}}
@keyframes shake{0%,100%{transform:translateX(0)}10%,30%,50%,70%,90%{transform:translateX(-5px)}20%,40%,60%,80%{transform:translateX(5px)}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes confetti{0%{transform:translateY(-100vh) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes sparkle{0%,100%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1)}}
@keyframes fire{0%,100%{text-shadow:0 0 10px #ff6b35,0 0 20px #ff4500,0 0 30px #ff0000}50%{text-shadow:0 0 20px #ff6b35,0 0 40px #ff4500,0 0 60px #ff0000}}
@keyframes holographic{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes borderGlow{0%,100%{border-color:var(--neon-pink)}33%{border-color:var(--neon-purple)}66%{border-color:var(--neon-blue)}}
@keyframes flip{0%{transform:perspective(600px) rotateY(0)}100%{transform:perspective(600px) rotateY(180deg)}}body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg-dark);background-image:radial-gradient(ellipse at top,rgba(157,78,221,0.15),transparent 50%),radial-gradient(ellipse at bottom,rgba(0,212,255,0.1),transparent 50%);color:#fff;min-height:100vh;padding:15px;overflow-x:hidden}
.bg-particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.particle{position:absolute;width:4px;height:4px;background:var(--neon-pink);border-radius:50%;animation:float 8s ease-in-out infinite;opacity:0.5}
.container{max-width:900px;margin:0 auto;position:relative;z-index:1}
.header{text-align:center;padding:20px 0;margin-bottom:15px}
.header h1{font-size:2.5rem;font-weight:900;background:linear-gradient(135deg,var(--neon-pink),var(--neon-purple),var(--neon-blue),var(--neon-cyan));background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:holographic 4s ease infinite;margin-bottom:5px}
.header p{color:rgba(255,255,255,0.7);font-size:0.95rem}
.stats-bar{display:flex;justify-content:center;gap:15px;margin-bottom:15px;flex-wrap:wrap}
.stat-item{background:var(--glass);backdrop-filter:blur(10px);border:1px solid rgba(255,45,149,0.3);border-radius:15px;padding:12px 20px;text-align:center;transition:all 0.3s ease;animation:borderGlow 3s linear infinite}
.stat-item:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(255,45,149,0.3)}
.stat-value{font-size:1.8rem;font-weight:bold;background:linear-gradient(135deg,var(--neon-pink),var(--neon-purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-label{font-size:0.75rem;color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:1px}
.combo-display{position:fixed;top:20px;right:20px;background:linear-gradient(135deg,var(--fire),#ff4500);padding:15px 25px;border-radius:20px;font-size:1.5rem;font-weight:bold;animation:fire 0.5s ease infinite;display:none;z-index:100;box-shadow:0 0 30px rgba(255,107,53,0.5)}
.combo-display.active{display:block}
.level-progress{background:rgba(255,255,255,0.1);border-radius:15px;height:12px;margin-bottom:20px;overflow:hidden;position:relative;border:1px solid rgba(255,45,149,0.3)}
.level-bar{height:100%;border-radius:15px;transition:width 0.5s ease;background:linear-gradient(90deg,var(--neon-pink),var(--neon-purple),var(--neon-blue));background-size:200% 100%;animation:holographic 2s linear infinite;box-shadow:0 0 15px var(--neon-pink)}
.nav-tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:15px;justify-content:center}
.nav-btn{background:var(--glass);backdrop-filter:blur(10px);border:1px solid rgba(157,78,221,0.3);color:#fff;padding:10px 18px;border-radius:25px;cursor:pointer;font-size:0.9rem;transition:all 0.3s ease;font-weight:500}
.nav-btn:hover{background:rgba(157,78,221,0.3);transform:translateY(-2px);box-shadow:0 5px 20px rgba(157,78,221,0.3)}
.nav-btn.active{background:linear-gradient(135deg,var(--neon-pink),var(--neon-purple));border-color:transparent;box-shadow:0 0 25px rgba(255,45,149,0.5)}
.category-filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:15px;justify-content:center}
.cat-btn{background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.3);color:#fff;padding:6px 14px;border-radius:20px;cursor:pointer;font-size:0.8rem;transition:all 0.3s ease}
.cat-btn:hover{background:rgba(0,212,255,0.2)}
.cat-btn.active{background:linear-gradient(135deg,var(--neon-cyan),var(--neon-blue));border-color:transparent}
.power-ups{display:flex;justify-content:center;gap:10px;margin-bottom:15px}
.power-btn{background:linear-gradient(135deg,var(--gold),#ffaa00);border:none;color:#000;padding:8px 16px;border-radius:15px;cursor:pointer;font-weight:bold;font-size:0.85rem;transition:all 0.3s ease;display:flex;align-items:center;gap:5px}
.power-btn:hover{transform:scale(1.05);box-shadow:0 0 20px rgba(255,215,0,0.5)}
.power-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.power-btn .count{background:rgba(0,0,0,0.3);padding:2px 8px;border-radius:10px}
.game-area{background:var(--bg-card);backdrop-filter:blur(20px);border:1px solid rgba(255,45,149,0.2);border-radius:25px;padding:25px;min-height:400px;animation:slideUp 0.5s ease;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.game-title{text-align:center;font-size:1.6rem;margin-bottom:20px;background:linear-gradient(135deg,var(--neon-pink),var(--neon-cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.flashcard{background:linear-gradient(135deg,var(--neon-purple),var(--neon-pink),var(--neon-blue));background-size:200% 200%;animation:holographic 5s ease infinite;border-radius:25px;padding:40px;text-align:center;cursor:pointer;min-height:220px;display:flex;flex-direction:column;justify-content:center;align-items:center;margin-bottom:20px;transition:all 0.4s ease;transform-style:preserve-3d;perspective:1000px;box-shadow:0 20px 50px rgba(157,78,221,0.4)}
.flashcard:hover{transform:translateY(-10px) rotateX(5deg);box-shadow:0 30px 60px rgba(157,78,221,0.5)}
.flashcard.flip{animation:flip 0.6s ease-out}
.flashcard-korean{font-size:3.5rem;margin-bottom:10px;text-shadow:0 0 20px rgba(255,255,255,0.5)}
.flashcard-romanization{font-size:1.2rem;color:rgba(255,255,255,0.85);margin-bottom:10px}
.flashcard-english{font-size:1.4rem;color:#fff}
.flashcard-rarity{position:absolute;top:15px;right:15px;padding:5px 12px;border-radius:15px;font-size:0.75rem;font-weight:bold}
.rarity-common{background:rgba(255,255,255,0.2)}
.rarity-rare{background:linear-gradient(135deg,#00d4ff,#0099ff);color:#000}
.rarity-epic{background:linear-gradient(135deg,#9d4edd,#7b2cbf)}
.rarity-legendary{background:linear-gradient(135deg,#ffd700,#ff8c00);color:#000;animation:pulse 1s infinite}
.game-controls{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
.game-btn{background:linear-gradient(135deg,var(--neon-pink),var(--neon-purple));border:none;color:#fff;padding:14px 28px;border-radius:25px;cursor:pointer;font-size:1rem;font-weight:600;transition:all 0.3s ease;box-shadow:0 5px 20px rgba(255,45,149,0.4)}
.game-btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(255,45,149,0.5)}
.game-btn.secondary{background:var(--glass);border:1px solid rgba(255,45,149,0.3);box-shadow:none}
.game-btn.secondary:hover{background:rgba(255,45,149,0.2)}
.memory-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:500px;margin:0 auto 20px}
.memory-card{aspect-ratio:1;background:linear-gradient(135deg,var(--neon-purple),var(--neon-pink));border-radius:15px;display:flex;justify-content:center;align-items:center;cursor:pointer;font-size:1.4rem;transition:all 0.3s ease;transform-style:preserve-3d;box-shadow:0 5px 15px rgba(157,78,221,0.3)}
.memory-card:hover{transform:scale(1.05)}
.memory-card.flipped{background:linear-gradient(135deg,#1a1a3e,#2a2a5e);color:#fff}
.memory-card.matched{background:linear-gradient(135deg,#00d4ff,#00f5d4);animation:pulse 0.5s ease}
.quiz-options{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:20px}
.quiz-option{background:var(--glass);backdrop-filter:blur(10px);border:2px solid rgba(157,78,221,0.3);color:#fff;padding:20px;border-radius:15px;cursor:pointer;text-align:center;font-size:1.1rem;transition:all 0.3s ease}
.quiz-option:hover{border-color:var(--neon-pink);transform:translateY(-3px);box-shadow:0 10px 30px rgba(255,45,149,0.2)}
.quiz-option.correct{background:linear-gradient(135deg,#00d4ff,#00f5d4);border-color:transparent;animation:pulse 0.5s ease}
.quiz-option.wrong{background:linear-gradient(135deg,#ff4757,#ff6b81);border-color:transparent;animation:shake 0.5s ease}
.speed-timer{font-size:4rem;text-align:center;background:linear-gradient(135deg,var(--neon-pink),var(--neon-cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:20px;font-weight:bold}
.speed-timer.urgent{animation:pulse 0.5s infinite;filter:hue-rotate(180deg)}
.speed-input{width:100%;max-width:350px;padding:18px;font-size:1.3rem;border:2px solid var(--neon-purple);border-radius:15px;background:rgba(255,255,255,0.05);color:#fff;text-align:center;display:block;margin:0 auto;transition:all 0.3s ease}
.speed-input:focus{outline:none;border-color:var(--neon-pink);box-shadow:0 0 30px rgba(255,45,149,0.3)}
.boss-battle{background:linear-gradient(135deg,#ff0000,#8b0000);padding:30px;border-radius:20px;text-align:center;animation:glow 1s infinite}
.boss-hp{background:rgba(0,0,0,0.5);border-radius:10px;height:25px;margin:15px 0;overflow:hidden}
.boss-hp-bar{height:100%;background:linear-gradient(90deg,#ff0000,#ff4444);transition:width 0.5s ease;border-radius:10px}
.hangul-display{font-size:5rem;text-align:center;margin-bottom:25px;background:linear-gradient(135deg,var(--neon-pink),var(--neon-cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hangul-keys{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:15px}
.hangul-key{width:48px;height:48px;background:var(--glass);backdrop-filter:blur(10px);border:1px solid rgba(157,78,221,0.3);border-radius:12px;color:#fff;font-size:1.5rem;cursor:pointer;display:flex;justify-content:center;align-items:center;transition:all 0.2s ease}
.hangul-key:hover{background:var(--neon-purple);transform:scale(1.1);box-shadow:0 0 20px rgba(157,78,221,0.5)}
.stats-panel{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
.stats-card{background:var(--glass);backdrop-filter:blur(10px);border:1px solid rgba(157,78,221,0.3);border-radius:15px;padding:20px;text-align:center;transition:all 0.3s ease}
.stats-card:hover{transform:translateY(-5px);border-color:var(--neon-pink)}
.stats-card-value{font-size:2.2rem;font-weight:bold;background:linear-gradient(135deg,var(--neon-pink),var(--neon-cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stats-card-label{color:rgba(255,255,255,0.6);margin-top:5px;font-size:0.85rem}
.achievements-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
.achievement{background:var(--glass);border:1px solid rgba(100,100,100,0.3);border-radius:15px;padding:20px;text-align:center;opacity:0.4;transition:all 0.3s ease}
.achievement.unlocked{border-color:var(--neon-pink);background:linear-gradient(135deg,rgba(255,45,149,0.1),rgba(157,78,221,0.1));opacity:1;animation:glow 2s infinite}
.achievement-icon{font-size:2.5rem;margin-bottom:10px}
.achievement-title{font-weight:bold;margin-bottom:5px;color:var(--neon-pink)}
.achievement-desc{font-size:0.8rem;color:rgba(255,255,255,0.6)}
.popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:linear-gradient(135deg,var(--neon-purple),var(--neon-pink));padding:40px;border-radius:25px;text-align:center;z-index:200;box-shadow:0 30px 80px rgba(0,0,0,0.8);transition:transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275)}
.popup.active{transform:translate(-50%,-50%) scale(1)}
.popup h2{font-size:2rem;margin-bottom:15px}
.popup p{font-size:1.2rem;margin-bottom:20px}
.confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:150;overflow:hidden}
.confetti{position:absolute;width:10px;height:10px;animation:confetti 3s linear forwards}
.sparkle{position:absolute;font-size:1.5rem;animation:sparkle 0.8s ease-out forwards;pointer-events:none}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:100;opacity:0;pointer-events:none;transition:opacity 0.3s ease}
.overlay.active{opacity:1;pointer-events:auto}
@media(max-width:600px){.header h1{font-size:1.8rem}.flashcard-korean{font-size:2.5rem}.memory-grid{grid-template-columns:repeat(3,1fr)}.quiz-options{grid-template-columns:1fr}.nav-btn{padding:8px 14px;font-size:0.8rem}.stat-item{padding:10px 15px}.stat-value{font-size:1.4rem}}

.daily-banner{background:linear-gradient(135deg,#ff6b35,#ffd700);padding:15px;border-radius:15px;text-align:center;margin-bottom:15px;cursor:pointer}
.gacha-wheel{width:250px;height:250px;margin:0 auto;border-radius:50%;background:conic-gradient(#ff2d95,#9d4edd,#00d4ff,#00f5d4,#ffd700,#ff6b35,#ff2d95);position:relative}
.gacha-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:80px;height:80px;background:#1a1a3e;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem}
.settings-btn{position:fixed;top:10px;right:10px;width:40px;height:40px;border-radius:50%;background:var(--glass);border:1px solid rgba(157,78,221,0.3);color:#fff;cursor:pointer;z-index:50}
.settings-btn.muted{opacity:0.5}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--neon-purple);padding:15px 30px;border-radius:25px;color:#fff;transition:transform 0.3s;z-index:300}
.toast.show{transform:translateX(-50%) translateY(0)}
.xp-float{position:fixed;pointer-events:none;font-weight:bold;color:var(--gold);animation:floatUp 1s forwards;z-index:200}
@keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-50px)}}
.streak-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;max-width:280px;margin:20px auto}
.streak-day{aspect-ratio:1;background:var(--glass);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:0.75rem}
.streak-day.done{background:var(--neon-pink)}
.streak-day.today{border:2px solid var(--gold)}
.diff-btn{padding:8px 16px;border-radius:15px;border:2px solid;background:transparent;color:#fff;cursor:pointer;margin:5px}
.diff-btn.active{background:var(--neon-pink)}
.share-btn{background:linear-gradient(135deg,#1DA1F2,#0077B5);border:none;color:#fff;padding:12px 24px;border-radius:20px;cursor:pointer;font-weight:bold}

.mascot{position:fixed;bottom:20px;left:20px;width:80px;height:80px;z-index:50;cursor:pointer;animation:bounce 2s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
.mascot svg{width:100%;height:100%;filter:drop-shadow(0 5px 15px rgba(255,45,149,0.5))}
.word-image{font-size:5rem;text-align:center;margin:20px 0;animation:float 3s ease-in-out infinite}
.category-icon{font-size:1.5rem;margin-right:8px}
.youtube-embed{width:100%;max-width:560px;height:315px;margin:20px auto;border-radius:15px;border:2px solid var(--neon-pink)}
.image-card{background:linear-gradient(135deg,rgba(20,10,40,0.9),rgba(40,20,60,0.9));border-radius:20px;padding:20px;text-align:center;margin-bottom:20px}
.word-emoji{font-size:4rem;margin-bottom:15px;display:block}
.progress-ring{width:120px;height:120px;margin:0 auto}
.progress-ring circle{fill:none;stroke-width:8;stroke-linecap:round}
.progress-ring .bg{stroke:rgba(255,255,255,0.1)}
.progress-ring .progress{stroke:url(#gradient);transform:rotate(-90deg);transform-origin:center;transition:stroke-dashoffset 0.5s}
.visual-hint{display:flex;align-items:center;justify-content:center;gap:10px;font-size:1.5rem;margin:15px 0;padding:15px;background:rgba(255,255,255,0.05);border-radius:15px}
.kpop-player{background:linear-gradient(135deg,#1DB954,#191414);padding:20px;border-radius:20px;margin:20px 0}
.gif-container{width:200px;height:200px;margin:0 auto;border-radius:20px;overflow:hidden;border:3px solid var(--neon-pink)}
.gif-container img{width:100%;height:100%;object-fit:cover}
.learning-tip{background:linear-gradient(135deg,rgba(0,212,255,0.2),rgba(157,78,221,0.2));padding:15px;border-radius:15px;margin:15px 0;border-left:4px solid var(--neon-cyan)}
.word-context{font-size:0.9rem;color:rgba(255,255,255,0.7);margin-top:10px;font-style:italic}
</style>
</head>
<body>
<div class="bg-particles" id="bgParticles"></div>
<div class="confetti-container" id="confettiContainer"></div>
<div class="overlay" id="overlay"></div>
<div class="popup" id="popup"><h2 id="popupTitle"></h2><p id="popupText"></p><button class="game-btn" onclick="closePopup()">OK!</button></div>
<div class="combo-display" id="comboDisplay">COMBO x<span id="comboCount">0</span></div>
<button class="settings-btn" id="soundBtn" onclick="toggleSound()">S</button><div class="toast" id="toast"></div><div class="mascot" onclick="mascotTalk()" title="Click me!">
<svg viewBox="0 0 100 100"><defs><linearGradient id="mascotGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#ff2d95"/><stop offset="100%" style="stop-color:#9d4edd"/></linearGradient></defs>
<circle cx="50" cy="50" r="45" fill="url(#mascotGrad)"/>
<circle cx="35" cy="40" r="8" fill="#fff"/><circle cx="65" cy="40" r="8" fill="#fff"/>
<circle cx="35" cy="40" r="4" fill="#000"/><circle cx="65" cy="40" r="4" fill="#000"/>
<path d="M35 65 Q50 80 65 65" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round"/>
<ellipse cx="25" cy="55" rx="8" ry="5" fill="rgba(255,150,150,0.5)"/>
<ellipse cx="75" cy="55" rx="8" ry="5" fill="rgba(255,150,150,0.5)"/>
</svg></div><div class="container">
<div class="header"><h1>K-POP Korean Learning</h1><p>Master Korean with style!</p></div>
<div class="stats-bar">
<div class="stat-item"><div class="stat-value" id="levelDisplay">1</div><div class="stat-label">LEVEL</div></div>
<div class="stat-item"><div class="stat-value" id="xpDisplay">0</div><div class="stat-label">XP</div></div>
<div class="stat-item"><div class="stat-value" id="streakDisplay">0</div><div class="stat-label">STREAK</div></div>
<div class="stat-item"><div class="stat-value" id="bestComboDisplay">0</div><div class="stat-label">BEST COMBO</div></div>
</div>
<div class="level-progress"><div class="level-bar" id="levelBar" style="width:0%"></div></div>
<div class="power-ups" id="powerUps">

var SoundEngine={ctx:null,init:function(){try{this.ctx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}},play:function(freq,dur,type){if(!this.ctx)return;try{var o=this.ctx.createOscillator(),g=this.ctx.createGain();o.connect(g);g.connect(this.ctx.destination);o.type=type||'sine';o.frequency.value=freq;g.gain.setValueAtTime(0.3,this.ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.01,this.ctx.currentTime+dur);o.start();o.stop(this.ctx.currentTime+dur)}catch(e){}},correct:function(){this.play(523,0.1);setTimeout(function(){SoundEngine.play(659,0.1)},100);setTimeout(function(){SoundEngine.play(784,0.2)},200)},wrong:function(){this.play(200,0.3,'sawtooth')},levelUp:function(){var f=[523,659,784,1047];for(var i=0;i<f.length;i++){(function(idx){setTimeout(function(){SoundEngine.play(f[idx],0.15)},idx*100)})(i)}},combo:function(){this.play(880,0.1);setTimeout(function(){SoundEngine.play(1100,0.15)},80)},boss:function(){this.play(100,0.5,'sawtooth')}};
function shuffle(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}
function getWords(){var words=[];if(gameState.currentCategory==='all'){for(var cat in wordDatabase){words=words.concat(wordDatabase[cat])}}else if(wordDatabase[gameState.currentCategory]){words=wordDatabase[gameState.currentCategory]}return words}
function loadProgress(){try{var saved=localStorage.getItem('kpopKoreanGame');if(saved){var data=JSON.parse(saved);for(var key in data){if(gameState.hasOwnProperty(key)){gameState[key]=data[key]}}}}catch(e){}}
function saveProgress(){try{localStorage.setItem('kpopKoreanGame',JSON.stringify(gameState))}catch(e){}}
function collectWord(word){if(!gameState.collectedWords[word.korean]){gameState.collectedWords[word.korean]=word.rarity;gameState.wordsLearned++;checkAchievements();saveProgress()}}
function checkAchievements(){for(var i=0;i<achievementDefs.length;i++){var a=achievementDefs[i];if(!gameState.achievements[a.id]&&a.condition()){gameState.achievements[a.id]=true;showPopup('Achievement Unlocked!',a.title+' - '+a.desc);SoundEngine.levelUp();saveProgress()}}}
function addXP(amount){var mult=1;if(gameState.activePower==='2x'&&Date.now()<gameState.powerEndTime){mult=2}gameState.xp+=amount*mult;var xpNeeded=gameState.level*100;while(gameState.xp>=xpNeeded){gameState.xp-=xpNeeded;gameState.level++;SoundEngine.levelUp();createConfetti(50);showPopup('Level Up!','You reached level '+gameState.level+'!');xpNeeded=gameState.level*100}updateStatsDisplay();checkAchievements();saveProgress()}
function addCombo(){gameState.combo++;if(gameState.combo>gameState.bestCombo){gameState.bestCombo=gameState.combo}var cd=document.getElementById('comboDisplay');var cc=document.getElementById('comboCount');if(cd&&cc){cd.classList.add('active');cc.textContent=gameState.combo}if(gameState.combo>=3){SoundEngine.combo()}updateStatsDisplay();saveProgress()}
function resetCombo(){gameState.combo=0;var cd=document.getElementById('comboDisplay');if(cd){cd.classList.remove('active')}}
function updateStatsDisplay(){var le=document.getElementById('levelDisplay');var xe=document.getElementById('xpDisplay');var se=document.getElementById('streakDisplay');var be=document.getElementById('bestComboDisplay');var lb=document.getElementById('levelBar');if(le)le.textContent=gameState.level;if(xe)xe.textContent=gameState.xp;if(se)se.textContent=gameState.streak;if(be)be.textContent=gameState.bestCombo;if(lb){var xpNeeded=gameState.level*100;var pct=(gameState.xp/xpNeeded)*100;lb.style.width=pct+'%'}}
function updatePowerButtons(){document.getElementById('power2xCount').textContent=gameState.powerUps['2x'];document.getElementById('powerSkipCount').textContent=gameState.powerUps.skip;document.getElementById('powerHintCount').textContent=gameState.powerUps.hint;document.getElementById('power2x').disabled=gameState.powerUps['2x']<=0;document.getElementById('powerSkip').disabled=gameState.powerUps.skip<=0;document.getElementById('powerHint').disabled=gameState.powerUps.hint<=0}
function usePower(type){if(gameState.powerUps[type]<=0)return;gameState.powerUps[type]--;updatePowerButtons();saveProgress();if(type==='2x'){gameState.activePower='2x';gameState.powerEndTime=Date.now()+30000;showPopup('2X XP Active!','Double XP for 30 seconds!')}else if(type==='skip'){showMode(gameState.currentMode)}else if(type==='hint'){showPopup('Hint','Listen carefully and take your time!')}}
function showPopup(title,text){document.getElementById('popupTitle').textContent=title;document.getElementById('popupText').textContent=text;document.getElementById('popup').classList.add('active');document.getElementById('overlay').classList.add('active')}
function closePopup(){document.getElementById('popup').classList.remove('active');document.getElementById('overlay').classList.remove('active')}
function createConfetti(count){var container=document.getElementById('confettiContainer');var colors=['#ff2d95','#9d4edd','#00d4ff','#00f5d4','#ffd700'];for(var i=0;i<count;i++){var conf=document.createElement('div');conf.className='confetti';conf.style.left=Math.random()*100+'%';conf.style.background=colors[Math.floor(Math.random()*colors.length)];conf.style.animationDelay=Math.random()*2+'s';container.appendChild(conf);setTimeout(function(el){el.remove()},3000,conf)}}
function createSparkle(x,y){var sp=document.createElement('div');sp.textContent='*';sp.style.cssText='position:fixed;left:'+x+'px;top:'+y+'px;color:#ffd700;font-size:2rem;pointer-events:none';document.body.appendChild(sp);setTimeout(function(){sp.remove()},800)}

function answerQuiz(idx){if(quizAnswered)return;quizAnswered=true;var sel=quizOptions[idx],opts=document.querySelectorAll('.quiz-option');if(sel.korean===quizWord.korean){opts[idx].classList.add('correct');gameState.streak++;gameState.correctAnswers++;collectWord(quizWord);SoundEngine.correct();addCombo();addXP(20);createSparkle(window.innerWidth/2,window.innerHeight/2)}else{opts[idx].classList.add('wrong');gameState.streak=0;resetCombo();SoundEngine.wrong();screenShake();saveProgress();for(var i=0;i<opts.length;i++){if(quizOptions[i].korean===quizWord.korean){opts[i].classList.add('correct')}}}updateStatsDisplay()}

function updateStreak(){var today=new Date().toDateString();if(streakDays.indexOf(today)===-1){streakDays.push(today);if(streakDays.length>30)streakDays=streakDays.slice(-30);saveProgress()}}
function getStreakCount(){var count=0;var d=new Date();for(var i=0;i<30;i++){if(streakDays.indexOf(d.toDateString())!==-1)count++;else if(i>0)break;d.setDate(d.getDate()-1)}return count}
function showStreak(c){updateStreak();var h="<h2 class=\"game-title\">Learning Streak</h2><p style=\"text-align:center;font-size:2rem;color:var(--neon-pink);margin:20px 0\">"+getStreakCount()+" Days</p>";h+="<div class=\"streak-grid\">";var days=["S","M","T","W","T","F","S"];for(var i=0;i<7;i++)h+="<div style=\"font-weight:bold;color:var(--neon-cyan)\">"+days[i]+"</div>";var today=new Date();var first=new Date(today.getFullYear(),today.getMonth(),1);for(var j=0;j<first.getDay();j++)h+="<div class=\"streak-day\"></div>";var last=new Date(today.getFullYear(),today.getMonth()+1,0).getDate();for(var day=1;day<=last;day++){var ds=new Date(today.getFullYear(),today.getMonth(),day).toDateString();var done=streakDays.indexOf(ds)!==-1;var isToday=day===today.getDate();h+="<div class=\"streak-day"+(done?" done":"")+(isToday?" today":"")+"\">"+day+"</div>"}h+="</div><p style=\"text-align:center;margin-top:20px\">Keep learning every day to build your streak!</p>";c.innerHTML=h}
var dailyCompleted=false,dailyScore=0,dailyQ=0,dailyWord=null,dailyStart=0;
function showDaily(c){var today=new Date().toDateString();var saved=localStorage.getItem("dailyDate");if(saved===today&&localStorage.getItem("dailyDone")==="true"){c.innerHTML="<h2 class=\"game-title\">Daily Challenge</h2><p style=\"text-align:center;font-size:1.5rem\">Today\"s challenge completed!</p><p style=\"text-align:center;font-size:2.5rem;color:var(--gold);margin:20px 0\">"+localStorage.getItem("dailyScore")+" pts</p><p style=\"text-align:center\">Come back tomorrow!</p>";return}var h="<h2 class=\"game-title\">Daily Challenge</h2><p style=\"text-align:center;margin-bottom:20px\">Answer 10 questions as fast as possible!</p><p style=\"text-align:center;color:var(--neon-cyan)\">Faster = More Points!</p><div class=\"game-controls\" style=\"margin-top:30px\"><button class=\"game-btn\" id=\"startDailyBtn\">Start Challenge</button></div>";c.innerHTML=h;document.getElementById("startDailyBtn").onclick=function(){startDaily(c)}}
function startDaily(c){dailyScore=0;dailyQ=0;dailyStart=Date.now();gameState.gamesPlayed++;saveProgress();nextDailyQ(c)}
function nextDailyQ(c){if(dailyQ>=10){endDaily(c);return}dailyQ++;var words=getWords();var s=shuffle(words);dailyWord=s[0];var opts=shuffle([s[0],s[1],s[2],s[3]]);var h="<h2 class=\"game-title\">Question "+dailyQ+"/10</h2><div style=\"font-size:3rem;text-align:center;margin:30px 0\">"+dailyWord.korean+"</div><div class=\"quiz-options\">";for(var i=0;i<4;i++){h+="<div class=\"quiz-option\" data-k=\""+opts[i].korean+"\">"+opts[i].english+"</div>"}h+="</div>";c.innerHTML=h;c.querySelectorAll(".quiz-option").forEach(function(o){o.onclick=function(){answerDaily(this,c)}})}
function answerDaily(el,c){var correct=el.getAttribute("data-k")===dailyWord.korean;if(correct){el.classList.add("correct");dailyScore+=100;SoundEngine.correct()}else{el.classList.add("wrong");SoundEngine.wrong()}setTimeout(function(){nextDailyQ(c)},500)}
function endDaily(c){var time=(Date.now()-dailyStart)/1000;var timeBonus=Math.max(0,Math.floor((60-time)*10));dailyScore+=timeBonus;localStorage.setItem("dailyDate",new Date().toDateString());localStorage.setItem("dailyDone","true");localStorage.setItem("dailyScore",dailyScore);addXP(Math.floor(dailyScore/5));saveScore(dailyScore);createConfetti(100);var h="<h2 class=\"game-title\">Challenge Complete!</h2><p style=\"text-align:center;font-size:3rem;color:var(--gold);margin:20px 0\">"+dailyScore+"</p><p style=\"text-align:center\">Time: "+time.toFixed(1)+"s</p><p style=\"text-align:center;margin-top:10px\">Time Bonus: +"+timeBonus+"</p><div class=\"game-controls\" style=\"margin-top:30px\"><button class=\"share-btn\" onclick=\"shareScore()\">Share Result</button></div>";c.innerHTML=h}
function shareScore(){var text="I scored "+dailyScore+" points in K-POP Korean Learning! Can you beat me?";if(navigator.share){navigator.share({title:"K-POP Korean",text:text})}else{navigator.clipboard.writeText(text);showToast("Copied to clipboard!")}}

function showKpopVideo(c){var vid=kpopVideos[Math.floor(Math.random()*kpopVideos.length)];var h="<h2 class=\"game-title\">K-POP Listening</h2>";h+="<p style=\"text-align:center;margin-bottom:15px\">Watch and learn Korean from K-POP!</p>";h+="<iframe class=\"youtube-embed\" src=\"https://www.youtube.com/embed/"+vid+"\" frameborder=\"0\" allowfullscreen></iframe>";h+="<div class=\"learning-tip\"><strong>Tip:</strong> Turn on Korean subtitles to learn new words!</div>";h+="<div class=\"game-controls\"><button class=\"game-btn\" onclick=\"showKpopVideo(document.getElementById('gameArea'))\">Next Video</button></div>";c.innerHTML=h}

function showImageQuiz(c){var foods=Object.keys(foodImages);if(foods.length<4){showQuiz(c);return}var shuffled=shuffle(foods);var correct=shuffled[0];var opts=shuffle(shuffled.slice(0,4));var h="<h2 class=\"game-title\">Picture Quiz</h2>";h+="<p style=\"text-align:center;margin-bottom:15px\">What is this food?</p>";h+="<div style=\"text-align:center\"><img src=\""+foodImages[correct]+"\" style=\"max-width:250px;border-radius:20px;border:3px solid var(--neon-pink)\" onerror=\"this.style.display='none'\"></div>";h+="<div class=\"quiz-options\" style=\"margin-top:20px\">";for(var i=0;i<opts.length;i++){h+="<div class=\"quiz-option\" data-k=\""+opts[i]+"\">"+getWordEmoji(opts[i])+" "+opts[i]+"</div>"}h+="</div>";c.innerHTML=h;c.querySelectorAll(".quiz-option").forEach(function(o){o.onclick=function(){var isCorrect=this.getAttribute("data-k")===correct;if(isCorrect){this.classList.add("correct");SoundEngine.correct();addXP(25);addCombo()}else{this.classList.add("wrong");SoundEngine.wrong();resetCombo()}setTimeout(function(){showImageQuiz(c)},1000)}})}
